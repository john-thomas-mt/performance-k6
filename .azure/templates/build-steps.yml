steps:
  - script: echo "##vso[task.setvariable variable=npmCacheDir]$HOME/.npm"
    displayName: 'Set npm cache directory'

  - task: Cache@2
    inputs:
      key: 'npm | "$(Agent.OS)" | package-lock.json'
      restoreKeys: |
        npm | "$(Agent.OS)"
      path: $(npmCacheDir)
    displayName: 'Cache npm dependencies'

  - task: NodeTool@0
    inputs:
      versionSource: 'spec'
      versionSpec: '20.x'
    displayName: 'Install Node.js'

  - script: npm ci
    displayName: 'Install Dependencies (CI)'

  - script: |
      npm run secret -- --key
    displayName: 'Generate secret.json'

  - script: |
      npm run setup -- --site "$SITE" --env "$RELEASE"
    displayName: 'Generate setup.json'
    env:
      SITE: $(site)
      RELEASE: $(releaseVersion)

  - script: |
      npx tsc --noEmit
    displayName: 'TypeScript Compilation Check'

  - publish: $(Build.SourcesDirectory)
    artifact: MomentusK6PerformanceTests
    displayName: 'Publish k6 Performance Tests'
