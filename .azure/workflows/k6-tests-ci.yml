# Manually-triggered pipeline (queue on demand). It runs the k6 load test against the target
# environment on a self-hosted Windows agent and publishes the HTML report + console log.
# Does not trigger on commits or PRs — use k6-tests-ci-dev.yml for PR validation.

trigger: none

pr: none

variables:
  # K6_DECRYPT_KEY (the passphrase used to mint source/data/users.data.ts) is NOT defined here — it is
  # a secret pipeline variable set in the UI (Edit pipeline > Variables > new var, "Keep this value
  # secret"). Secrets must never be committed in YAML. It is referenced as $(K6_DECRYPT_KEY) below.
  - name: site
    value: 'PERF'
  - name: releaseVersion
    value: 'main'
  # The load spec k6 runs and graphs. Referenced by both the run and the resource-graph steps so the
  # test-file name and resolved VU config on the report always match what actually ran.
  - name: specPath
    value: 'source/tests/load.spec.ts'

jobs:
  - job: RunK6
    displayName: 'Run k6 load tests'
    # The load profile runs 5m ramp + 10m sustain + 2m ramp-down (~17.5m incl. graceful stop); this
    # budget covers that plus npm ci, the fresh k6 download, resource graphing, publish and cleanup.
    timeoutInMinutes: 45
    pool:
      # Steps below are OS-agnostic (they detect Windows vs Linux), so no Agent.OS demand is needed.
      # Add a demand (e.g. 'Agent.Name -equals <agent>') only to pin the job to one specific machine.
      name: 'Momentus-Cloud-AutomatedTesting'
    steps:
      - checkout: self
        clean: true

      - task: NodeTool@0
        displayName: 'Install Node.js'
        inputs:
          versionSource: 'spec'
          versionSpec: '20.x'

      - script: npm ci
        displayName: 'Install dependencies (npm ci)'

      - powershell: |
          npm run setup -- --site "$env:SITE" --env "$env:RELEASE"
        displayName: 'Write setup.json'
        env:
          SITE: $(site)
          RELEASE: $(releaseVersion)

      - powershell: |
          npm run secret -- --key "$env:K6_DECRYPT_KEY"
        displayName: 'Write secret.json (decryption passphrase)'
        env:
          # Passed via env (not inline $(...)) so the masked secret is not expanded into the build log.
          K6_DECRYPT_KEY: $(K6_DECRYPT_KEY)

      - powershell: |
          $ErrorActionPreference = 'Stop'
          # OS detection that works in both Windows PowerShell 5.1 (Windows agent) and PowerShell Core
          # (Linux agent) — $IsWindows does not exist in 5.1, but $env:OS does.
          $isWin = $env:OS -eq 'Windows_NT'
          if ($isWin) {
            # Windows PowerShell 5.1 may default below TLS 1.2, which GitHub rejects — force TLS 1.2.
            [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          }
          # Official standalone-binary install (https://grafana.com/docs/k6/latest/set-up/install-k6/):
          # download the GitHub Releases build for this OS and put the k6 binary on PATH. Preferred over
          # winget/choco/apt here because it installs nothing machine-wide and is wiped by the cleanup step.
          # Pin $tag to a specific version (e.g. 'v1.0.0') for reproducibility.
          $release = Invoke-RestMethod -Uri 'https://api.github.com/repos/grafana/k6/releases/latest' -Headers @{ 'User-Agent' = 'azure-pipelines' }
          $tag = $release.tag_name
          $dest = Join-Path $env:AGENT_TEMPDIRECTORY 'k6'
          # Remove any copy left by a previous run so k6 is always freshly downloaded.
          if (Test-Path $dest) { Remove-Item -Path $dest -Recurse -Force }
          if ($isWin) {
            $asset = "k6-$tag-windows-amd64.zip"
            $archive = Join-Path $env:AGENT_TEMPDIRECTORY 'k6.zip'
            $exe = 'k6.exe'
          } else {
            $asset = "k6-$tag-linux-amd64.tar.gz"
            $archive = Join-Path $env:AGENT_TEMPDIRECTORY 'k6.tar.gz'
            $exe = 'k6'
          }
          if (Test-Path $archive) { Remove-Item -Path $archive -Force }
          $url = "https://github.com/grafana/k6/releases/download/$tag/$asset"
          Write-Host "Downloading k6 $tag from $url"
          Invoke-WebRequest -Uri $url -OutFile $archive
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          if ($isWin) {
            Expand-Archive -Path $archive -DestinationPath $dest -Force
          } else {
            tar -xzf $archive -C $dest
          }
          $k6path = (Get-ChildItem -Path $dest -Recurse -Filter $exe -File | Select-Object -First 1).FullName
          if (-not $isWin) { chmod +x $k6path }
          Write-Host "##vso[task.prependpath]$(Split-Path $k6path -Parent)"
          & $k6path version
        displayName: 'Install k6 (fresh download)'

      - powershell: |
          # Sample agent CPU/RAM/network/load in the background for the duration of the k6 run.
          # Linux agents use the Node sampler (/proc); Windows agents use the Get-Counter sampler.
          $isWin = $env:OS -eq 'Windows_NT'
          if ($isWin) {
            $sampler = Start-Process powershell -ArgumentList '-NoProfile','-ExecutionPolicy','Bypass','-File','.azure/scripts/resource-sampler.ps1','temp/resource-usage.csv','1' -PassThru -NoNewWindow
          } else {
            $sampler = Start-Process node -ArgumentList '.azure/scripts/resource-sampler.cjs','temp/resource-usage.csv','1' -PassThru -NoNewWindow
          }
          # Sample k6's own Go runtime/GC metrics from its Prometheus endpoint (enabled by --address +
          # --profiling-enabled below); the Node sampler skips ticks until the endpoint is up. This
          # measures the k6 load generator, not the system under test.
          $gcSampler = Start-Process node -ArgumentList '.azure/scripts/gc-sampler.cjs','temp/gc-usage.csv','1','127.0.0.1:6565' -PassThru -NoNewWindow
          try {
            k6 run --quiet --address=127.0.0.1:6565 --profiling-enabled "$(specPath)" 2>&1 | Tee-Object -FilePath temp/k6-console.log
            $code = $LASTEXITCODE
          } finally {
            foreach ($s in $sampler, $gcSampler) {
              if ($s -and -not $s.HasExited) { Stop-Process -Id $s.Id -Force -ErrorAction SilentlyContinue }
            }
          }
          exit $code
        displayName: 'Run k6 load test'
        errorActionPreference: continue
        failOnStderr: false
        env:
          # The load run is long enough that the report always renders with graphs, so this keeps k6's
          # default aggregation period (10s) — a 1s period over ~17.5m would bloat report.html.
          K6_WEB_DASHBOARD: 'true'
          K6_WEB_DASHBOARD_EXPORT: 'temp/report.html'
          K6_WEB_DASHBOARD_PERIOD: '10s'

      - powershell: |
          # Resolve the spec's VU config (executor, max VUs, stages, duration) with zero traffic so the
          # report shows what actually ran; Out-File -Encoding utf8 for Node (grapher strips the BOM).
          # k6 inspect reads temp/setup.json + temp/secret.json (still present until cleanup).
          k6 inspect --execution-requirements "$(specPath)" | Out-File -FilePath temp/exec-req.json -Encoding utf8
          node .azure/scripts/resource-grapher.cjs temp/resource-usage.csv temp/resource-usage.html "$(specPath)" temp/exec-req.json
          node .azure/scripts/gc-grapher.cjs temp/gc-usage.csv temp/gc-usage.html "$(specPath)" temp/exec-req.json
        displayName: 'Generate resource & GC utilization graphs'
        condition: always()

      - powershell: |
          New-Item -ItemType Directory -Force -Path '$(Build.ArtifactStagingDirectory)/k6-results' | Out-Null
        displayName: 'Ensure results staging folder exists'
        condition: always()

      - task: CopyFiles@2
        displayName: 'Stage k6 results (report + console log only)'
        condition: always()
        inputs:
          # Copy only the report and log — never the whole temp/ folder, which holds the plaintext secret.json.
          SourceFolder: '$(Build.SourcesDirectory)/temp'
          Contents: |
            report.html
            k6-console.log
            resource-usage.csv
            resource-usage.html
            gc-usage.csv
            gc-usage.html
          TargetFolder: '$(Build.ArtifactStagingDirectory)/k6-results'

      - publish: '$(Build.ArtifactStagingDirectory)/k6-results'
        artifact: 'k6-results'
        displayName: 'Publish k6 results artifact'
        condition: always()

      - powershell: |
          # Runs after publish so nothing sensitive lingers on the persistent self-hosted agent:
          # delete the plaintext passphrase (temp/secret.json) plus the generated setup/results files
          # and the freshly downloaded k6 binary.
          foreach ($f in 'temp/secret.json', 'temp/setup.json', 'temp/report.html', 'temp/k6-console.log', 'temp/resource-usage.csv', 'temp/resource-usage.html', 'temp/gc-usage.csv', 'temp/gc-usage.html', 'temp/exec-req.json') {
            if (Test-Path $f) { Remove-Item -Path $f -Force }
          }
          foreach ($a in 'k6.zip', 'k6.tar.gz') {
            $p = Join-Path $env:AGENT_TEMPDIRECTORY $a
            if (Test-Path $p) { Remove-Item -Path $p -Force }
          }
          $k6dir = Join-Path $env:AGENT_TEMPDIRECTORY 'k6'
          if (Test-Path $k6dir) { Remove-Item -Path $k6dir -Recurse -Force }
        displayName: 'Cleanup (remove secret + k6 binary)'
        condition: always()
